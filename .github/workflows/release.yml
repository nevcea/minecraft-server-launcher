name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: paper-launcher-linux-amd64
          - goos: linux
            goarch: arm64
            name: paper-launcher-linux-arm64
          - goos: darwin
            goarch: amd64
            name: paper-launcher-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: paper-launcher-darwin-arm64
          - goos: windows
            goarch: amd64
            name: paper-launcher-windows-amd64.exe
          - goos: windows
            goarch: arm64
            name: paper-launcher-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          go build -ldflags="-s -w \
            -X 'github.com/nevcea-sub/minecraft-server-launcher/internal/update.launcherVersion=${VERSION}' \
            -X 'github.com/nevcea-sub/minecraft-server-launcher/internal/update.githubUserAgent=minecraft-server-launcher-updater/${VERSION}'" \
            -o ${{ matrix.name }} .
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
          generate_release_notes: true
